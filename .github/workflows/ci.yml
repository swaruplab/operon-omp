name: CI

on:
  push:
    branches: [dev, main, cross-platform]
  pull_request:
    branches: [dev, main, cross-platform]

# Cancel in-progress runs for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ── Lint (runs once, fast) ────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev
      - run: npm ci
      - name: Fetch ripgrep sidecar binaries
        shell: bash
        run: bash scripts/fetch-ripgrep.sh
      - name: Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - name: TypeScript type check
        run: npx tsc --noEmit

  # ── Build Matrix (all 3 platforms) ────────────────────────────
  build:
    needs: lint
    strategy:
      fail-fast: false    # Don't cancel other platforms if one fails
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            tauri-bundle: dmg
            label: macOS ARM

          - os: macos-14
            rust-target: x86_64-apple-darwin
            tauri-bundle: dmg
            label: macOS Intel

          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            tauri-bundle: msi,nsis
            label: Windows x64

          - os: ubuntu-24.04
            rust-target: x86_64-unknown-linux-gnu
            tauri-bundle: deb,appimage
            label: Linux x64

    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.rust-target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Platform-specific system dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch ripgrep sidecar binaries
        shell: bash
        run: bash scripts/fetch-ripgrep.sh

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml --target ${{ matrix.rust-target }}

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --target ${{ matrix.rust-target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.rust-target }} --bundles ${{ matrix.tauri-bundle }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: operon-${{ matrix.rust-target }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.AppImage
          retention-days: 14
